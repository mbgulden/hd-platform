<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful | Human Design Engine</title>
<style>
  :root{--navy-deep:#060d1a;--gold:#c9a84c;--gold-light:#e0c468;--text-primary:#e8e6e3;--text-secondary:#8899aa}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',-apple-system,sans-serif;background:var(--navy-deep);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
  .card{background:rgba(15,29,54,0.7);border:1px solid rgba(201,168,76,0.2);border-radius:20px;padding:48px 40px;max-width:500px;margin:24px}
  .check{font-size:3rem;margin-bottom:16px;color:#4ade80}
  h1{font-size:1.6rem;margin-bottom:12px}h1 span{color:var(--gold-light)}
  p{color:var(--text-secondary);font-size:1rem;margin-bottom:8px;line-height:1.6}
  .btn{display:inline-block;margin-top:24px;padding:12px 28px;background:linear-gradient(135deg,#d4af37,var(--gold));color:var(--navy-deep);border-radius:10px;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="card">
  <div class="check">✅</div>
  <h1>Payment <span>Successful!</span></h1>
  <p>Your Human Design report is being generated.</p>
  <p>You'll receive an email with your PDF within 5 minutes.</p>
  <p style="font-size:0.85rem;color:#5a6a7a;margin-top:16px">Check your inbox (and spam folder if you don't see it).</p>
  <a href="/" class="btn">← Back to Home</a>
</div>
</body>
</html>
